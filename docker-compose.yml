version: "3.9"

services:
  pipeline:
    build: .
    container_name: data_pipeline
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app
      - TZ=America/Sao_Paulo
    command: ["--config", "config/config.yaml"]
    restart: "no"

  pipeline-scheduled:
    build: .
    container_name: data_pipeline_scheduled
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONPATH=/app
      - TZ=America/Sao_Paulo
    command: ["--config", "config/config.yaml", "--schedule", "daily"]
    restart: unless-stopped
